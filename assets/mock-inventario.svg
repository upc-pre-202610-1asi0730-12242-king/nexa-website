<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-label="Inventario FEFO con lotes ordenados por vencimiento y alertas de cadena de frío">
  <defs>
    <style>
      .surf{fill:#ffffff}
      .ink{fill:#252118;font-family:'DM Sans',system-ui,sans-serif;font-weight:500}
      .ink-2{fill:#5c554c;font-family:'DM Sans',system-ui,sans-serif;font-weight:400}
      .ink-3{fill:#6b6259;font-family:'DM Sans',system-ui,sans-serif;font-weight:400}
      .display{fill:#252118;font-family:'Fraunces',Georgia,serif;font-weight:600}
      .mono{font-family:'JetBrains Mono',ui-monospace,monospace;fill:#252118}
      .row{stroke:#e7e0d3;stroke-width:1}
      .ok{fill:#eaf5ee}
      .ok-tx{fill:#2d7d4f;font-family:'DM Sans',system-ui,sans-serif;font-weight:600}
      .warn{fill:#fef3e2}
      .warn-tx{fill:#b06a00;font-family:'DM Sans',system-ui,sans-serif;font-weight:600}
      .danger{fill:#fdecea}
      .danger-tx{fill:#c0312b;font-family:'DM Sans',system-ui,sans-serif;font-weight:600}
    </style>
  </defs>
  <rect class="surf" width="640" height="420" rx="14"/>
  <rect x="1" y="1" width="638" height="418" rx="13" fill="none" stroke="#e7e0d3"/>

  <!-- Header -->
  <text class="display" x="28" y="44" font-size="18">Inventario FEFO · Bodega Surquillo</text>
  <text class="ink-3" x="28" y="64" font-size="12">14 lotes próximos a vencer · prioriza salida del más antiguo primero</text>

  <!-- KPI strip -->
  <rect x="28" y="80" width="180" height="56" rx="8" fill="#faf6ee"/>
  <text class="ink-3" x="44" y="100" font-size="10" font-weight="600">VENCEN ≤ 7 DÍAS</text>
  <text class="display" x="44" y="124" font-size="22">3 lotes</text>

  <rect x="220" y="80" width="180" height="56" rx="8" fill="#faf6ee"/>
  <text class="ink-3" x="236" y="100" font-size="10" font-weight="600">CADENA DE FRÍO</text>
  <text class="display" x="236" y="124" font-size="22">1 alerta</text>

  <rect x="412" y="80" width="200" height="56" rx="8" fill="#faf6ee"/>
  <text class="ink-3" x="428" y="100" font-size="10" font-weight="600">ROTACIÓN MES</text>
  <text class="display" x="428" y="124" font-size="22">82%</text>

  <!-- Table header -->
  <line x1="28" y1="156" x2="612" y2="156" class="row"/>
  <text class="ink-3" x="28" y="172" font-size="10" font-weight="600">LOTE</text>
  <text class="ink-3" x="160" y="172" font-size="10" font-weight="600">PRODUCTO</text>
  <text class="ink-3" x="372" y="172" font-size="10" font-weight="600">VENCE</text>
  <text class="ink-3" x="448" y="172" font-size="10" font-weight="600">STOCK</text>
  <text class="ink-3" x="514" y="172" font-size="10" font-weight="600">ESTADO</text>
  <line x1="28" y1="180" x2="612" y2="180" class="row"/>

  <!-- Row 1 — danger -->
  <text class="mono" x="28" y="206" font-size="12">L-2406-08</text>
  <text class="ink" x="160" y="206" font-size="12">Yogur griego 1 kg</text>
  <text class="mono" x="372" y="206" font-size="12">22/04</text>
  <text class="mono" x="448" y="206" font-size="12">36 und</text>
  <rect x="510" y="190" width="84" height="20" rx="10" class="danger"/>
  <text class="danger-tx" x="520" y="204" font-size="10">2 días · urge</text>
  <line x1="28" y1="220" x2="612" y2="220" class="row"/>

  <!-- Row 2 — warn -->
  <text class="mono" x="28" y="246" font-size="12">L-2406-04</text>
  <text class="ink" x="160" y="246" font-size="12">Queso fresco 500 g</text>
  <text class="mono" x="372" y="246" font-size="12">26/04</text>
  <text class="mono" x="448" y="246" font-size="12">112 und</text>
  <rect x="510" y="230" width="74" height="20" rx="10" class="warn"/>
  <text class="warn-tx" x="520" y="244" font-size="10">6 días</text>
  <line x1="28" y1="260" x2="612" y2="260" class="row"/>

  <!-- Row 3 — warn -->
  <text class="mono" x="28" y="286" font-size="12">L-2406-11</text>
  <text class="ink" x="160" y="286" font-size="12">Mantequilla 330 g</text>
  <text class="mono" x="372" y="286" font-size="12">27/04</text>
  <text class="mono" x="448" y="286" font-size="12">68 und</text>
  <rect x="510" y="270" width="74" height="20" rx="10" class="warn"/>
  <text class="warn-tx" x="520" y="284" font-size="10">7 días</text>
  <line x1="28" y1="300" x2="612" y2="300" class="row"/>

  <!-- Row 4 — ok -->
  <text class="mono" x="28" y="326" font-size="12">L-2406-12</text>
  <text class="ink" x="160" y="326" font-size="12">Jamón serrano 200 g</text>
  <text class="mono" x="372" y="326" font-size="12">11/05</text>
  <text class="mono" x="448" y="326" font-size="12">94 und</text>
  <rect x="510" y="310" width="74" height="20" rx="10" class="ok"/>
  <text class="ok-tx" x="520" y="324" font-size="10">21 días</text>
  <line x1="28" y1="340" x2="612" y2="340" class="row"/>

  <!-- Cold-chain breach banner -->
  <rect x="28" y="352" width="584" height="48" rx="8" class="danger"/>
  <circle cx="50" cy="376" r="9" fill="#c0312b"/>
  <text x="50" y="380" text-anchor="middle" fill="#ffffff" font-family="'DM Sans',system-ui,sans-serif" font-weight="700" font-size="11">!</text>
  <text class="danger-tx" x="72" y="372" font-size="12">Cadena de frío · cámara 2 estuvo a 11 °C entre 03:14 y 03:38</text>
  <text class="ink-2" x="72" y="389" font-size="11">Lote L-2406-08 marcado para inspección · revisa antes de despachar</text>
</svg>
