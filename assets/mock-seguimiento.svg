<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-label="Seguimiento de despacho con timeline operativo y confirmación del cliente B2B">
  <defs>
    <style>
      .surf{fill:#ffffff}
      .ink{fill:#252118;font-family:'DM Sans',system-ui,sans-serif;font-weight:500}
      .ink-2{fill:#5c554c;font-family:'DM Sans',system-ui,sans-serif;font-weight:400}
      .ink-3{fill:#6b6259;font-family:'DM Sans',system-ui,sans-serif;font-weight:400}
      .display{fill:#252118;font-family:'Fraunces',Georgia,serif;font-weight:600}
      .mono{font-family:'JetBrains Mono',ui-monospace,monospace;fill:#252118}
      .accent{fill:#2a67d9}
      .ok{fill:#2d7d4f}
      .ok-bg{fill:#eaf5ee}
      .ok-tx{fill:#2d7d4f;font-family:'DM Sans',system-ui,sans-serif;font-weight:600}
      .pending{fill:#cec7bb}
    </style>
  </defs>
  <rect class="surf" width="640" height="420" rx="14"/>
  <rect x="1" y="1" width="638" height="418" rx="13" fill="none" stroke="#e7e0d3"/>

  <!-- Header -->
  <text class="display" x="28" y="44" font-size="18">Despacho NX-2406-118</text>
  <text class="ink-3" x="28" y="64" font-size="12">Restaurante Achiote · 4 SKU · 36 und · S/ 595.66</text>

  <rect x="478" y="24" width="138" height="32" rx="16" class="ok-bg"/>
  <circle cx="492" cy="40" r="4" class="ok"/>
  <text class="ok-tx" x="504" y="44" font-size="11">En reparto desde 09:42</text>

  <!-- Timeline rail -->
  <line x1="62" y1="118" x2="62" y2="334" stroke="#e7e0d3" stroke-width="2"/>

  <!-- Step 1 done -->
  <circle cx="62" cy="124" r="10" class="ok"/>
  <path d="M57 124 L61 128 L67 122" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="ink" x="86" y="120" font-size="13">Pedido confirmado</text>
  <text class="ink-3" x="86" y="138" font-size="11">mar 16/04 · 14:08 · Karla M.</text>

  <!-- Step 2 done -->
  <circle cx="62" cy="174" r="10" class="ok"/>
  <path d="M57 174 L61 178 L67 172" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="ink" x="86" y="170" font-size="13">Picking en bodega · cámara 1</text>
  <text class="ink-3" x="86" y="188" font-size="11">mié 17/04 · 07:12 · lotes L-2406-04, L-2406-12 reservados</text>

  <!-- Step 3 done -->
  <circle cx="62" cy="224" r="10" class="ok"/>
  <path d="M57 224 L61 228 L67 222" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="ink" x="86" y="220" font-size="13">Carga en unidad NX-V-04</text>
  <text class="ink-3" x="86" y="238" font-size="11">mié 17/04 · 09:28 · termógrafo 4.2 °C · conductor: J. Mamani</text>

  <!-- Step 4 in progress -->
  <circle cx="62" cy="274" r="10" fill="#ffffff" stroke="#2a67d9" stroke-width="2"/>
  <circle cx="62" cy="274" r="4" class="accent"/>
  <text class="ink" x="86" y="270" font-size="13">En ruta · ETA 10:55</text>
  <text class="ink-3" x="86" y="288" font-size="11">mié 17/04 · 09:42 · 12 paradas previas · cliente notificado por WhatsApp</text>

  <!-- Step 5 pending -->
  <circle cx="62" cy="324" r="10" fill="#ffffff" class="pending" stroke="#cec7bb" stroke-width="2"/>
  <text class="ink-3" x="86" y="320" font-size="13">Entrega y firma del cliente</text>
  <text class="ink-3" x="86" y="338" font-size="11">pendiente · captura foto del POD + temperatura al destino</text>

  <!-- Right column: cold chain card -->
  <rect x="396" y="100" width="216" height="164" rx="10" fill="#faf6ee" stroke="#e7e0d3"/>
  <text class="ink-3" x="412" y="120" font-size="10" font-weight="600">CADENA DE FRÍO · UNIDAD NX-V-04</text>
  <text class="display mono" x="412" y="148" font-size="22">4.2 °C</text>
  <text class="ink-3" x="412" y="166" font-size="11">objetivo 2-8 °C · estable hace 1h 14m</text>

  <!-- mini chart -->
  <polyline points="412,228 432,222 452,224 472,220 492,226 512,221 532,223 552,219 572,222 592,220"
            fill="none" stroke="#2d7d4f" stroke-width="2" stroke-linejoin="round"/>
  <line x1="412" y1="240" x2="592" y2="240" stroke="#cec7bb" stroke-width="1"/>
  <text class="ink-3" x="412" y="254" font-size="9">08:00</text>
  <text class="ink-3" x="568" y="254" font-size="9">ahora</text>

  <!-- POD action -->
  <rect x="396" y="280" width="216" height="54" rx="8" fill="#eef3fd"/>
  <text class="accent" x="412" y="302" font-size="11" font-weight="600">Cuando llegue: capturar POD</text>
  <text class="ink-2" x="412" y="320" font-size="11">foto + firma + temperatura al destino</text>
</svg>
