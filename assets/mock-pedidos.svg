<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-label="Pedido estructurado por cliente con líneas SKU y total operativo">
  <defs>
    <style>
      .surf{fill:#ffffff}
      .ink{fill:#252118;font-family:'DM Sans',system-ui,sans-serif;font-weight:500}
      .ink-2{fill:#5c554c;font-family:'DM Sans',system-ui,sans-serif;font-weight:400}
      .ink-3{fill:#6b6259;font-family:'DM Sans',system-ui,sans-serif;font-weight:400}
      .display{fill:#252118;font-family:'Fraunces',Georgia,serif;font-weight:600}
      .mono{font-family:'JetBrains Mono',ui-monospace,monospace;fill:#252118}
      .row{stroke:#e7e0d3;stroke-width:1}
      .accent{fill:#2a67d9}
      .pill{fill:#eef3fd}
      .pill-tx{fill:#1f52b8;font-family:'DM Sans',system-ui,sans-serif;font-weight:600}
    </style>
  </defs>
  <rect class="surf" width="640" height="420" rx="14"/>
  <rect x="1" y="1" width="638" height="418" rx="13" fill="none" stroke="#e7e0d3"/>

  <!-- Header -->
  <text class="display" x="28" y="44" font-size="18">Pedido NX-2406-118</text>
  <text class="ink-3" x="28" y="64" font-size="12">Restaurante Achiote · Av. Pardo 482, Miraflores · entrega mié 17/04</text>

  <rect x="486" y="24" width="128" height="32" rx="16" class="pill"/>
  <circle cx="500" cy="40" r="3" fill="#1f52b8"/>
  <text class="pill-tx" x="510" y="44" font-size="11">Capturado por Karla M.</text>

  <!-- Origin chip -->
  <rect x="28" y="80" width="240" height="26" rx="13" fill="#eef3fd"/>
  <text class="pill-tx" x="40" y="97" font-size="11">Origen: WhatsApp · 09:42 · transcrito</text>

  <!-- Table header -->
  <line x1="28" y1="124" x2="612" y2="124" class="row"/>
  <text class="ink-3" x="28" y="140" font-size="10" font-weight="600">SKU</text>
  <text class="ink-3" x="220" y="140" font-size="10" font-weight="600">PRODUCTO</text>
  <text class="ink-3" x="404" y="140" font-size="10" font-weight="600">CANT</text>
  <text class="ink-3" x="466" y="140" font-size="10" font-weight="600">PRECIO</text>
  <text class="ink-3" x="556" y="140" font-size="10" font-weight="600">SUBTOTAL</text>
  <line x1="28" y1="148" x2="612" y2="148" class="row"/>

  <!-- Row 1 -->
  <text class="mono" x="28" y="172" font-size="12">NX-QF-500</text>
  <text class="ink" x="220" y="172" font-size="12">Queso fresco Andino 500 g</text>
  <text class="ink mono" x="404" y="172" font-size="12">12</text>
  <text class="ink mono" x="466" y="172" font-size="12">S/ 8.40</text>
  <text class="ink mono" x="556" y="172" font-size="12">S/ 100.80</text>
  <line x1="28" y1="184" x2="612" y2="184" class="row"/>

  <!-- Row 2 -->
  <text class="mono" x="28" y="208" font-size="12">NX-YG-1K</text>
  <text class="ink" x="220" y="208" font-size="12">Yogur griego natural 1 kg</text>
  <text class="ink mono" x="404" y="208" font-size="12">6</text>
  <text class="ink mono" x="466" y="208" font-size="12">S/ 14.90</text>
  <text class="ink mono" x="556" y="208" font-size="12">S/ 89.40</text>
  <line x1="28" y1="220" x2="612" y2="220" class="row"/>

  <!-- Row 3 -->
  <text class="mono" x="28" y="244" font-size="12">NX-JS-200</text>
  <text class="ink" x="220" y="244" font-size="12">Jamón serrano lonchas 200 g</text>
  <text class="ink mono" x="404" y="244" font-size="12">10</text>
  <text class="ink mono" x="466" y="244" font-size="12">S/ 22.50</text>
  <text class="ink mono" x="556" y="244" font-size="12">S/ 225.00</text>
  <line x1="28" y1="256" x2="612" y2="256" class="row"/>

  <!-- Row 4 -->
  <text class="mono" x="28" y="280" font-size="12">NX-MN-330</text>
  <text class="ink" x="220" y="280" font-size="12">Mantequilla sin sal 330 g</text>
  <text class="ink mono" x="404" y="280" font-size="12">8</text>
  <text class="ink mono" x="466" y="280" font-size="12">S/ 11.20</text>
  <text class="ink mono" x="556" y="280" font-size="12">S/ 89.60</text>
  <line x1="28" y1="292" x2="612" y2="292" class="row"/>

  <!-- Notes -->
  <rect x="28" y="308" width="380" height="64" rx="8" fill="#faf6ee" stroke="#e7e0d3"/>
  <text class="ink-3" x="44" y="328" font-size="10" font-weight="600">NOTAS DEL CLIENTE</text>
  <text class="ink-2" x="44" y="346" font-size="11">Entregar antes de las 11 am · puerta de servicio</text>
  <text class="ink-2" x="44" y="362" font-size="11">Lote más fresco para el queso, por favor</text>

  <!-- Total -->
  <text class="ink-3" x="436" y="328" font-size="11">Subtotal · 4 líneas</text>
  <text class="ink mono" x="556" y="328" font-size="12">S/ 504.80</text>
  <text class="ink-3" x="436" y="350" font-size="11">IGV 18%</text>
  <text class="ink mono" x="556" y="350" font-size="12">S/ 90.86</text>
  <line x1="436" y1="358" x2="612" y2="358" class="row"/>
  <text class="display" x="436" y="382" font-size="14">Total</text>
  <text class="display mono" x="540" y="382" font-size="14">S/ 595.66</text>
</svg>
