<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-label="Catálogo Nexa con tarjetas de producto y temperatura objetivo">
  <defs>
    <style>
      .surf{fill:#ffffff}
      .card{fill:#ffffff;stroke:#cec7bb;stroke-width:1}
      .ink{fill:#252118;font-family:'DM Sans',system-ui,sans-serif;font-weight:500}
      .ink-2{fill:#5c554c;font-family:'DM Sans',system-ui,sans-serif;font-weight:400}
      .ink-3{fill:#6b6259;font-family:'DM Sans',system-ui,sans-serif;font-weight:400}
      .display{fill:#252118;font-family:'Fraunces',Georgia,serif;font-weight:600}
      .mono{font-family:'JetBrains Mono',ui-monospace,monospace}
      .pill{fill:#eaf5ee}
      .pill-tx{fill:#2d7d4f;font-family:'DM Sans',system-ui,sans-serif;font-weight:600}
      .pill-w{fill:#fef3e2}
      .pill-w-tx{fill:#b06a00;font-family:'DM Sans',system-ui,sans-serif;font-weight:600}
      .swatch{stroke:#cec7bb;stroke-width:1}
      .meta{fill:#aba098}
      .accent{fill:#2a67d9}
    </style>
  </defs>
  <rect class="surf" width="640" height="420" rx="14"/>
  <rect x="1" y="1" width="638" height="418" rx="13" fill="none" stroke="#e7e0d3" stroke-width="1"/>

  <!-- Toolbar -->
  <text class="ink display" x="28" y="44" font-size="18">Catálogo · 84 SKU activos</text>
  <rect x="412" y="24" width="200" height="32" rx="16" fill="#ffffff" stroke="#cec7bb"/>
  <circle cx="430" cy="40" r="5" fill="none" stroke="#6b6259" stroke-width="1.5"/>
  <line x1="434" y1="44" x2="439" y2="49" stroke="#6b6259" stroke-width="1.5" stroke-linecap="round"/>
  <text class="ink-3" x="446" y="44" font-size="12">Buscar SKU, lote, marca…</text>

  <!-- Filter row -->
  <rect x="28" y="68" width="86" height="26" rx="13" fill="#eef3fd"/>
  <text class="accent" x="40" y="85" font-size="11" font-weight="600">Refrigerado · 2-8 °C</text>
  <rect x="120" y="68" width="78" height="26" rx="13" fill="#ffffff" stroke="#cec7bb"/>
  <text class="ink-2" x="132" y="85" font-size="11">Congelado</text>
  <rect x="204" y="68" width="62" height="26" rx="13" fill="#ffffff" stroke="#cec7bb"/>
  <text class="ink-2" x="215" y="85" font-size="11">Seco</text>

  <!-- Card 1 — cheese -->
  <rect class="card" x="28" y="112" width="280" height="138" rx="10"/>
  <rect x="44" y="128" width="64" height="64" rx="6" fill="#fff8eb" class="swatch"/>
  <rect x="52" y="140" width="48" height="40" rx="3" fill="#f0d99a"/>
  <circle cx="64" cy="152" r="2" fill="#cda255"/>
  <circle cx="80" cy="160" r="1.6" fill="#cda255"/>
  <circle cx="92" cy="170" r="2" fill="#cda255"/>
  <text class="ink" x="124" y="144" font-size="14">Queso fresco Andino 500 g</text>
  <text class="ink-3" x="124" y="162" font-size="11">SKU NX-QF-500 · Lácteos La Sierra</text>
  <rect x="124" y="174" width="92" height="20" rx="10" class="pill"/>
  <text class="pill-tx" x="134" y="188" font-size="10">FEFO 12 días</text>
  <text class="ink mono" x="124" y="220" font-size="13">S/ 8.40 / und</text>
  <text class="ink-3" x="200" y="220" font-size="11">Caja × 12</text>
  <rect x="124" y="228" width="86" height="14" rx="3" fill="#eaf5ee"/>
  <text class="pill-tx" x="132" y="239" font-size="9">Stock 248 und</text>

  <!-- Card 2 — yogurt -->
  <rect class="card" x="328" y="112" width="284" height="138" rx="10"/>
  <rect x="344" y="128" width="64" height="64" rx="6" fill="#eef3fd" class="swatch"/>
  <rect x="356" y="140" width="40" height="46" rx="4" fill="#bcd2f3"/>
  <rect x="356" y="138" width="40" height="6" rx="2" fill="#7aaae8"/>
  <text class="ink" x="424" y="144" font-size="14">Yogur griego natural 1 kg</text>
  <text class="ink-3" x="424" y="162" font-size="11">SKU NX-YG-1K · Gloria S.A.</text>
  <rect x="424" y="174" width="100" height="20" rx="10" class="pill-w"/>
  <text class="pill-w-tx" x="434" y="188" font-size="10">FEFO 5 días · alerta</text>
  <text class="ink mono" x="424" y="220" font-size="13">S/ 14.90 / und</text>
  <text class="ink-3" x="510" y="220" font-size="11">Caja × 6</text>
  <rect x="424" y="228" width="80" height="14" rx="3" fill="#fef3e2"/>
  <text class="pill-w-tx" x="432" y="239" font-size="9">Stock 36 und</text>

  <!-- Card 3 — charcuterie -->
  <rect class="card" x="28" y="266" width="584" height="124" rx="10"/>
  <rect x="44" y="282" width="56" height="56" rx="6" fill="#fdecea" class="swatch"/>
  <rect x="56" y="298" width="32" height="22" rx="3" fill="#c97a72"/>
  <line x1="60" y1="304" x2="84" y2="304" stroke="#a85a52" stroke-width="1"/>
  <line x1="60" y1="310" x2="84" y2="310" stroke="#a85a52" stroke-width="1"/>
  <text class="ink" x="116" y="298" font-size="14">Jamón serrano lonchas 200 g</text>
  <text class="ink-3" x="116" y="316" font-size="11">SKU NX-JS-200 · Embutidos del Sur · cadena 0-4 °C</text>
  <rect x="116" y="328" width="86" height="20" rx="10" class="pill"/>
  <text class="pill-tx" x="126" y="342" font-size="10">FEFO 21 días</text>
  <rect x="208" y="328" width="118" height="20" rx="10" fill="#eef3fd"/>
  <text class="accent" x="218" y="342" font-size="10" font-weight="600">Cadena de frío OK</text>

  <text class="ink mono" x="436" y="298" font-size="14" font-weight="500">S/ 22.50</text>
  <text class="ink-3" x="436" y="314" font-size="11">Caja × 10</text>
  <rect x="436" y="324" width="160" height="32" rx="6" fill="#2a67d9"/>
  <text x="463" y="345" font-size="12" font-family="'DM Sans',system-ui,sans-serif" font-weight="600" fill="#ffffff">Agregar al pedido</text>
</svg>
